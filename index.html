<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Boîte à outils travaux</title>
    <meta
      name="description"
      content="Boîte à outils statique pour conducteur de travaux."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="page-header" aria-labelledby="page-title">
        <p class="eyebrow">Boîte à outils</p>
        <h1 id="page-title">Conducteur de travaux</h1>
      </section>

      <nav class="app-tabs" aria-label="Navigation principale">
        <button class="tab-button active" type="button" data-page="requestsPage">
          <span aria-hidden="true">📋</span>
          <span>Demandes</span>
        </button>
        <button class="tab-button" type="button" data-page="jobsitesPage">
          <span aria-hidden="true">🏗️</span>
          <span>Chantiers</span>
        </button>
      </nav>

      <section class="tool-card app-page active" id="requestsPage" aria-labelledby="requests-title">
        <div class="card-header">
          <div>
            <p class="card-kicker">Gestion rapide</p>
            <h2 id="requests-title">Demandes</h2>
          </div>
          <span class="card-icon" aria-hidden="true">📋</span>
        </div>

        <button class="primary-action" type="button" id="openTruckForm">
          <span aria-hidden="true">🚛</span>
          <span>Demande de camion</span>
        </button>

        <form class="request-form" id="truckForm" hidden>
          <section class="form-section" aria-labelledby="transport-title">
            <h3 id="transport-title">Transport</h3>
            <div class="form-grid">
              <label class="field">
                <span>Numéro de chantier</span>
                <input type="text" id="siteNumber" inputmode="numeric" placeholder="23508" required>
              </label>

              <label class="field">
                <span>Chantier</span>
                <select id="siteName" required>
                  <option value="" selected disabled>Choisir un chantier</option>
                </select>
              </label>
            </div>
            <input type="hidden" id="siteAddress">
          </section>

          <section class="form-section" aria-labelledby="pickup-title">
            <h3 id="pickup-title">Enlèvement</h3>
            <div class="form-grid">
              <label class="field field-full">
                <span>Adresse d’enlèvement</span>
                <input type="text" id="pickupAddress" value="BRIAND BOIS 2 rue des compagnons ST SYLVAIN ANJOU" required>
              </label>

              <label class="field field-full">
                <span>Nom contact et N° tel pour enlèvement</span>
                <input type="text" id="pickupContact" value="Thibaud CHAMPAGNE 06 24 73 78 43" required>
              </label>

              <label class="field">
                <span>Date et horaire d’enlèvement</span>
                <input type="text" id="pickupDateTime" placeholder="Vendredi 3/07 9h" required>
              </label>

              <label class="field">
                <span>Moyen de chargement</span>
                <input type="text" id="pickupLoading" value="Chariot" required>
              </label>

              <label class="field field-full">
                <span>Nature de la marchandise – Dimensions – Poids</span>
                <textarea id="goodsDetails" rows="4" required>1 container (2m50*2m50/2m de hauteur, 1T) + 8 palettes de quincaillerie (2m*2m*2m, 1T au total)</textarea>
              </label>
            </div>
          </section>

          <section class="form-section" aria-labelledby="delivery-title">
            <h3 id="delivery-title">Livraison</h3>
            <div class="form-grid">
              <label class="field field-full">
                <span>Nom contact et N° tel pour déchargement</span>
                <input type="text" id="deliveryContact" placeholder="Lorenzo 06 20 34 18 48" required>
              </label>

              <label class="field">
                <span>Date / fourchette de livraison</span>
                <input type="text" id="deliveryDateTime" placeholder="Lundi 6/07 à partir de 7h" required>
              </label>

              <label class="field">
                <span>Moyen de déchargement</span>
                <input type="text" id="deliveryUnloading" value="Grue à tour" required>
              </label>
            </div>
          </section>

          <button class="mail-action" type="submit">
            <span aria-hidden="true">✉️</span>
            <span>Créer le mail</span>
          </button>
        </form>
      </section>

      <section class="tool-card app-page" id="jobsitesPage" aria-labelledby="jobsites-title">
        <div class="card-header">
          <div>
            <p class="card-kicker">Base chantier</p>
            <h2 id="jobsites-title">Chantiers</h2>
          </div>
          <span class="card-icon" aria-hidden="true">🏗️</span>
        </div>

        <form class="jobsite-form" id="jobsiteForm">
          <div class="form-grid">
            <label class="field">
              <span>Nom du chantier</span>
              <input type="text" id="newJobsiteName" required>
            </label>

            <label class="field">
              <span>Adresse associée</span>
              <input type="text" id="newJobsiteAddress" required>
            </label>
          </div>

          <button class="mail-action" type="submit">
            <span aria-hidden="true">➕</span>
            <span>Ajouter le chantier</span>
          </button>
          <p class="sync-status" id="jobsiteStatus">Chargement des chantiers...</p>
        </form>

        <div class="jobsite-list-header">
          <h3>Liste des chantiers</h3>
          <span id="jobsiteCount">0 chantier</span>
        </div>

        <div class="jobsite-list" id="jobsiteList" aria-live="polite"></div>
      </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
